<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Voice App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: white;
            color: black;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 420px;
            border: 2px solid black;
            text-align: center;
        }

        .login-container h1 {
            color: black;
            font-weight: 700;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .form-control {
            background-color: white !important;
            color: black !important;
            border: 2px solid black !important;
            border-radius: 8px;
            padding: 12px;
            font-size: 1rem;
        }

        .form-control::placeholder {
            color: black;
            opacity: 0.7;
        }

        .form-control:focus {
            background-color: white !important;
            color: black !important;
            border-color: black !important;
            box-shadow: 0 0 0 0.25rem rgba(0, 0, 0, 0.1) !important;
            outline: none;
        }

        .btn-primary {
            background: black !important;
            color: white !important;
            border: none !important;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            width: 100%;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: #333 !important;
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }

        .alert {
            margin-top: 20px;
            background-color: #ffebee;
            color: #d32f2f;
            border: 1px solid #d32f2f;
            border-radius: 8px;
            padding: 12px;
            font-weight: 500;
        }

        .logo-img {
            width: 80px;
            margin-bottom: 20px;
        }

        /* Mobile responsiveness */
        @media (max-width: 576px) {
            .login-container {
                padding: 30px 20px;
                margin: 10px;
            }
            .login-container h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>

    <div class="login-container">
        <!-- Optional: Add your logo -->
        <!-- <img src="your-logo.png" alt="Logo" class="logo-img"> -->

        <h1>Login</h1>
        
        <form id="login-form">
            <div class="mb-3">
                <input type="text" id="username" class="form-control" placeholder="Username" required>
            </div>
            <div class="mb-4">
                <input type="password" id="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary">
                Login
            </button>
        </form>

        <div id="login-error" class="alert" role="alert" style="display: none;">
            Invalid credentials. Please try again.
        </div>
    </div>

    <script>
        // Show error from URL query
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const message = params.get('message');
            if (message) {
                const errorDiv = document.getElementById('login-error');
                errorDiv.innerText = decodeURIComponent(message);
                errorDiv.style.display = 'block';
            }
        });

        // Handle login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    window.location.href = '/calling';
                } else {
                    const data = await res.json();
                    const errorDiv = document.getElementById('login-error');
                    errorDiv.innerText = data.detail || 'Login failed. Try again.';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                document.getElementById('login-error').innerText = 'Network error. Check your connection.';
                document.getElementById('login-error').style.display = 'block';
            }
        });
    </script>

</body>
</html>
